<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Трек: Авто-детекция стоянок</title>
    <style>
        :root { --bg: #f8fafc; --panel: #ffffff; --primary: #2563eb; --parking: #f59e0b; --text: #0f172a; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        .layout { display: flex; height: 100vh; }
        .sidebar { 
            width: 340px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px; 
            display: flex; flex-direction: column; gap: 16px; box-shadow: 2px 0 12px rgba(0,0,0,0.05); z-index: 10; overflow-y: auto; 
        }
        .map-wrap { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        
        h2 { font-size: 18px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        h3 { font-size: 13px; font-weight: 600; color: #64748b; margin: 10px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .hint { font-size: 12px; color: #64748b; line-height: 1.4; }
        
        input[type="file"], input[type="datetime-local"], input[type="number"] {
            width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
        }
        
        .btn {
            width: 100%; padding: 10px; border: none; border-radius: 6px; 
            cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; margin-top: 4px;
        }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; color: #64748b; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
        
        .stats { background: #f1f5f9; padding: 12px; border-radius: 6px; font-size: 13px; line-height: 1.6; }
        .stats span { font-weight: 600; }
        
        #statusBox { 
            font-size: 13px; padding: 8px; border-radius: 6px; background: #f8fafc; border: 1px solid var(--border); 
            min-height: 36px; display: flex; align-items: center; 
        }
        
        .divider { height: 1px; background: var(--border); margin: 4px 0; }
        
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
        .badge-normal { background: #dbeafe; color: #1e40af; }
        .badge-parking { background: #fef3c7; color: #92400e; }
    </style>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=d0a762e8-e7fa-44db-909f-d248894b552d&lang=ru_RU"></script>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <h2>📍 GPS Трек Pro</h2>
        
        <div>
            <h3>1. Загрузка файла</h3>
            <input type="file" id="fileInput" accept=".txt,.csv,.log">
            <div id="fileInfo" class="hint" style="margin-top:4px;">Файл не выбран</div>
        </div>

        <div class="divider"></div>

        <div>
            <h3>2. Параметры расчёта</h3>
            <label style="font-size:12px; display:block; margin-bottom:4px;">Время старта:</label>
            <input type="datetime-local" id="startTime">
            
            <label style="font-size:12px; display:block; margin-top:8px; margin-bottom:4px;">Мин. длительность стоянки (сек):</label>
            <input type="number" id="parkDuration" value="60" min="10" step="10">
            <div class="hint" style="margin-top:4px;">Стоянки детектируются автоматически: dist ≤ 20м и speed ≤ 5 км/ч</div>
        </div>

        <div class="divider"></div>

        <div>
            <h3>3. Расчёт и Экспорт</h3>
            <button class="btn btn-primary" id="calcBtn" disabled>🚀 Рассчитать и Скачать .wln</button>
        </div>

        <div id="statusBox">Ожидание данных...</div>

        <div class="stats">
            <div>Всего точек: <span id="statTotal">0</span></div>
            <div>Стоянок найдено: <span id="statParking">0</span> <span id="parkBadge" class="badge badge-parking" style="display:none;">AUTO</span></div>
            <div>Дистанция: <span id="statDist">0</span> км</div>
        </div>
    </aside>

    <main class="map-wrap">
        <div id="map"></div>
    </main>
</div>

<script>
    let myMap;
    let trackPoints = []; 

    ymaps.ready(() => {
        myMap = new ymaps.Map("map", {
            center: [53.8, 86.8],
            zoom: 10,
            controls: ['zoomControl', 'typeSelector']
        });
    });

    // UI: Выбор файла
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('fileInfo').textContent = `✅ ${file.name}`;
        document.getElementById('calcBtn').disabled = false;
        document.getElementById('parkBadge').style.display = 'none';
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                trackPoints = parseFile(ev.target.result);
                document.getElementById('statTotal').textContent = trackPoints.length;
                setStatus(`✅ Загружено ${trackPoints.length} точек. Укажите время старта.`, 'success');
            } catch (err) {
                setStatus(`❌ Ошибка: ${err.message}`, 'error');
            }
        };
        reader.readAsText(file);
    });

    // UI: Кнопка расчёта
    document.getElementById('calcBtn').addEventListener('click', () => {
        const startVal = document.getElementById('startTime').value;
        if (!startVal) return setStatus('⚠️ Укажите дату и время старта', 'error');
        
        const minParkSec = parseInt(document.getElementById('parkDuration').value) || 60;
        
        try {
            // 1. Детекция стоянок
            const parkingClusters = detectParkingClusters(trackPoints);
            document.getElementById('statParking').textContent = parkingClusters.length;
            document.getElementById('parkBadge').style.display = parkingClusters.length > 0 ? 'inline-block' : 'none';
            
            // 2. Расчёт времени
            calculateTimestamps(trackPoints, startVal, minParkSec, parkingClusters);
            
            // 3. Визуализация
            renderMap(trackPoints, parkingClusters);
            
            // 4. Экспорт
            exportWln(trackPoints);
            
            let totalDist = 0;
            for(let i=0; i<trackPoints.length-1; i++) {
                totalDist += haversineMeters(trackPoints[i].lat, trackPoints[i].lon, trackPoints[i+1].lat, trackPoints[i+1].lon);
            }
            document.getElementById('statDist').textContent = (totalDist/1000).toFixed(2);
            setStatus(`✅ Готово. Найдено стоянок: ${parkingClusters.length}. Файл экспортирован.`, 'success');
        } catch (err) {
            setStatus(`❌ Ошибка: ${err.message}`, 'error');
        }
    });

    // --- 1. ПАРСИНГ ---
    function parseFile(text) {
        const matches = text.match(/-?\d+\.?\d*/g);
        if (!matches || matches.length < 4) throw new Error('Данные не найдены');
        const points = [];
        for (let i = 0; i < matches.length; i += 4) {
            if (i + 3 >= matches.length) break;
            points.push({
                lon: parseFloat(matches[i]), lat: parseFloat(matches[i+1]),
                speed: parseFloat(matches[i+2]), dir: parseFloat(matches[i+3]),
                originalLon: matches[i], originalLat: matches[i+1],
                timestamp: null, isParking: false
            });
        }
        return points;
    }

    // --- 2. ХАВЕРСИН ---
    function haversineMeters(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const toRad = x => x * Math.PI / 180;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- 3. ДЕТЕКЦИЯ СТОЯНОК ---
    function detectParkingClusters(points) {
        const clusters = [];
        let current = [];
        
        for (let i = 0; i < points.length - 1; i++) {
            const p1 = points[i];
            const p2 = points[i+1];
            const dist = haversineMeters(p1.lat, p1.lon, p2.lat, p2.lon);
            // Скорость в файле делится на 10. 5 км/ч = 50 в файле.
            const isParking = dist <= 20 && (p1.speed / 10) <= 5 && (p2.speed / 10) <= 5;
            
            if (isParking) {
                if (current.length === 0) current.push(i);
                if (!current.includes(i+1)) current.push(i+1);
            } else {
                if (current.length > 1) clusters.push([...current]);
                current = [];
            }
        }
        if (current.length > 1) clusters.push([...current]);
        
        // Помечаем точки
        clusters.forEach(c => c.forEach(idx => points[idx].isParking = true));
        return clusters;
    }

    // --- 4. РАСЧЁТ ВРЕМЕНИ ---
    function calculateTimestamps(points, startISO, minParkSec, clusters) {
        let startMs = new Date(startISO).getTime();
        points[0].timestamp = startMs;
        let lastMs = startMs;
        
        // Карта для быстрого поиска начала кластера
        let clusterStartMap = {};
        clusters.forEach(c => clusterStartMap[c[0]] = c);

        let i = 1;
        while (i < points.length) {
            let cluster = clusterStartMap[i];
            
            if (cluster) {
                // Обработка стоянки
                let endIdx = cluster[cluster.length - 1];
                let parkMs = minParkSec * 1000;
                let stepMs = parkMs / (endIdx - i);
                
                for (let k = i; k <= endIdx; k++) {
                    let t;
                    if (k === i) {
                        // Начало стоянки: время прибытия + 1 сек
                        t = lastMs + 1000;
                    } else {
                        // Распределение времени равномерно
                        t = points[k-1].timestamp + stepMs;
                    }
                    points[k].timestamp = Math.max(t, lastMs + 100);
                    lastMs = points[k].timestamp;
                }
                i = endIdx + 1;
            } else {
                // Обычная физическая модель
                let dist = haversineMeters(points[i-1].lat, points[i-1].lon, points[i].lat, points[i].lon);
                let speedKmh = Math.max(points[i-1].speed, points[i].speed) / 10;
                if (speedKmh < 0.5) speedKmh = 0.5; // защита от деления на 0
                
                let dtMs = (dist / 1000 / speedKmh) * 3600000;
                let t = points[i-1].timestamp + dtMs;
                points[i].timestamp = Math.max(t, lastMs + 100);
                lastMs = points[i].timestamp;
                i++;
            }
        }
    }

    // --- 5. ЭКСПОРТ ---
    function exportWln(data) {
        const lines = data.map(p => {
            const unixSec = Math.floor(p.timestamp / 1000);
            const speedInt = Math.round(p.speed); // Как в исходном файле
            const dirInt = Math.round(p.dir);
            return `REG;${unixSec};${p.originalLon};${p.originalLat};${speedInt};${dirInt};`;
        }).join('\r\n');

        const blob = new Blob([lines], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `track_auto_${Date.now()}.wln`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // --- 6. ОТРИСОВКА ---
    function renderMap(data, clusters) {
        myMap.geoObjects.removeAll();
        const collection = new ymaps.GeoObjectCollection();
        let buffer = [];
        
        // Создаём карту кластеров для быстрой проверки
        let clusterMap = {};
        clusters.forEach(c => c.forEach(idx => clusterMap[idx] = true));

        for(let i=0; i<data.length-1; i++) {
            let p1 = data[i];
            let p2 = data[i+1];
            buffer.push([p1.lat, p1.lon]);
            
            // Если тип сегмента меняется или конец
            let isCurrentParking = clusterMap[i];
            let isNextParking = clusterMap[i+1];
            
            if (isCurrentParking !== isNextParking || i === data.length - 2) {
                buffer.push([p2.lat, p2.lon]);
                if (buffer.length > 1) {
                    collection.add(new ymaps.Polyline(buffer, {}, {
                        strokeColor: isCurrentParking ? '#f59e0b' : '#2563eb',
                        strokeWidth: isCurrentParking ? 5 : 4,
                        strokeOpacity: 0.85,
                        strokeStyle: isCurrentParking ? 'dash' : 'solid'
                    }));
                }
                buffer = [];
            }
        }
        
        myMap.geoObjects.add(collection);
        if (data.length > 0) {
            myMap.setBounds(collection.getBounds(), { checkZoomRange: true, zoomMargin: 40 });
        }
    }

    function setStatus(msg, type) {
        const el = document.getElementById('statusBox');
        el.textContent = msg;
        el.style.color = type === 'error' ? '#dc2626' : type === 'success' ? '#16a34a' : '#475569';
        el.style.borderColor = type === 'error' ? '#fecaca' : type === 'success' ? '#bbf7d0' : '#e2e8f0';
        el.style.background = type === 'error' ? '#fef2f2' : type === 'success' ? '#f0fdf4' : '#f8fafc';
    }
</script>
</body>
</html>
